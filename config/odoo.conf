[options]
; Configuracao do Odoo 16

; Banco de dados
; Na VPS atual, o container PostgreSQL existente se chama odoo18-db
; e tambem possui alias db na rede externa odoo-net.
db_host = odoo18-db
db_port = 5432
db_user = odoo
; O valor real da senha vem do .env via variavel PASSWORD do container.
db_password = odoo
db_name = False

; Addons
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; Servidor
http_port = 8069
longpolling_port = 8072
proxy_mode = True

; Workers (ajuste conforme CPUs disponiveis; 0 = modo thread single)
workers = 2
max_cron_threads = 1

; Limites de memoria (bytes)
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

; Log
logfile = /var/log/odoo/odoo.log
log_level = info

; Seguranca
admin_passwd = SenhaAdminForte@2024

; Performance
without_demo = True
